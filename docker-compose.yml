# Minecraft Java Purpur Server + Geyser + Floodgate Docker Container - Docker Compose
# Author: James A. Chambers - https://jamesachambers.com/minecraft-java-bedrock-server-together-geyser-floodgate/
# GitHub Repository: https://github.com/ip0p/Legendary-Java-Minecraft-Geyser-Floodgate

# To run multiple servers change the volume name under both "volumes" sections and select different ports
version: "3.5"
services:
  minecraftbe:
    image: ghcr.io/ip0p/legendary-java-minecraft-geyser-floodgate:latest
    restart: "unless-stopped"
    # network_mode: host is required so Phantom can send UDP broadcast packets on the LAN
    # and Bedrock clients can discover the server automatically.
    # With host networking the ports below are bound directly on the host — no port mapping needed.
    network_mode: host
    # ports:         # not used with network_mode: host
    #   - 25565:25565
    #   - 19132:19132
    #   - 19132:19132/udp
    volumes:
      - minecraft:/minecraft
    stdin_open: true # docker run -i
    tty: true # docker run -t
    entrypoint: [ "/bin/bash", "/scripts/start.sh" ]
    # Environment variables
    environment:
      Port: "25565"
      BedrockPort: "19132"
      TZ: "America/Denver" # Timezone
      #BackupCount: 10 # Number of rolling backups to keep
      #MaxMemory: 2048 # Maximum memory usage for Java
      #Version: 1.19.3 # Use custom version
      #NoBackup: "plugins" # Optional folder to skip during backups
      #NoPermCheck: "Y" # Optional flag to skip permissions check
      #NoViaVersion: "Y" # Optional flag to disable ViaVersion plugin
      #QuietCurl: "Y" # Optional flag to reduce curl log output by suppressing progress meter
      #NoPhantom: "Y" # Optional flag to disable Phantom LAN discovery for Bedrock clients
volumes:
  minecraft:
    driver: local